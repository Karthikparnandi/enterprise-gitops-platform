name: DevSecOps Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    name: Security Vulnerability Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code from Repository
        uses: actions/checkout@v4

      - name: Run Trivy Security Vulnerability Scan on Backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          exit-code: '0' # In true production, change to '1' to intentionally crash the pipeline if major holes are found
          severity: 'CRITICAL,HIGH'

  build-containers:
    name: Automated Container Compilation
    needs: security-scan # Enforces that security checks must finish first
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code from Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx Compiler
        uses: docker/setup-buildx-action@v3

      - name: Mock Compile Backend Image
        run: |
          docker build ./backend --file ./backend/Dockerfile --tag gitops-backend:test

      - name: Mock Compile Frontend Image
        run: |
          docker build ./frontend --file ./frontend/Dockerfile --tag gitops-frontend:test