apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-backend-deployment
  labels:
    app: gitops-backend
spec:
  replicas: 2 # Maintains high-availability by running two parallel instances
  selector:
    matchLabels:
      app: gitops-backend
  template:
    metadata:
      labels:
        app: gitops-backend
    spec:
      containers:
      - name: backend-api
        image: karthikparnandi/enterprise-backend:latest # Placeholder for production image
        ports:
        - containerPort: 5000
        # Self-Healing: If the health check fails, K8s kills and restarts the container instantly
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gitops-backend-service
spec:
  selector:
    app: gitops-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP # Internal cluster routing network